<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>启点 — 陪你赚到第一块钱</title>
  <link rel="stylesheet" href="design-system.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <button class="app-header__back" onclick="location.href='index.html'" aria-label="返回首页">←</button>
    <span class="app-header__title">启点</span>
    <img id="user-avatar" class="app-header__avatar" src="" alt="" style="display:none; width:32px; height:32px; border-radius:50%; margin-left:auto;">
  </header>

  <!-- Progress Bar -->
  <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="旅程进度">
    <div class="progress-bar__fill" style="width: 0%"></div>
  </div>

  <!-- Progress Chip -->
  <div id="progress-chip" class="progress-chip" aria-label="阶段进度">第 1/6 阶段 · 起跑评估</div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div id="chat-messages" class="chat-area__messages" role="log" aria-label="对话内容">
      <div id="welcome-skeleton" class="chat-row chat-row--ai fade-in">
        <div class="bubble-ai">
          <div style="margin-bottom:var(--sp-2);color:var(--text-secondary)">正在准备你的旅程...</div>
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-bar__inner">
      <input class="input-bar__field" type="text" placeholder="说点什么..." id="chatInput" aria-label="输入消息">
      <button class="input-bar__send" id="sendBtn" aria-label="发送消息">↑</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
