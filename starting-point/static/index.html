<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>启点 — 帮你把行业经验变成第一笔收入</title>
  <meta name="description" content="启点帮你把行业经验变成第一笔收入。AI 引导你发现经验中最值钱的部分，包装成可以卖的知识产品，生成全套启动素材。">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <meta property="og:title" content="启点 — 帮你把行业经验变成第一笔收入">
  <meta property="og:description" content="AI 引导你发现经验中最值钱的部分，包装成知识产品，生成全套启动素材。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://firesing.cn">
  <meta property="og:site_name" content="启点">
  <meta property="og:locale" content="zh_CN">
  <link rel="stylesheet" href="design-system.css?v=6">
  <link rel="stylesheet" href="css/chat.css?v=6">
</head>
<body>

  <!-- ===== View 1: Landing ===== -->
  <div id="landing" class="view view--active">
    <div class="landing-v4">
      <div class="landing-v4__icon" role="img" aria-label="启点指南针">
        <svg viewBox="0 0 48 48" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="24" cy="24" r="20"/>
          <polygon points="24,8 28,24 24,40 20,24" fill="rgba(201,169,110,0.15)" stroke="#C9A96E"/>
          <line x1="24" y1="4" x2="24" y2="10"/>
          <line x1="24" y1="38" x2="24" y2="44"/>
          <line x1="4" y1="24" x2="10" y2="24"/>
          <line x1="38" y1="24" x2="44" y2="24"/>
        </svg>
      </div>

      <div class="landing-v4__name">启点</div>
      <p class="landing-v4__tagline">帮你把行业经验变成第一笔收入</p>

      <div class="landing-v4__cta">
        <button id="startBtn" class="btn-primary" aria-label="开始">开始</button>
      </div>
    </div>
  </div>

  <!-- ===== View 2: Chat ===== -->
  <div id="chat" class="view chat-v4">

    <!-- Header -->
    <header class="app-header">
      <span class="app-header__title">启点</span>
      <span class="app-header__step" id="stageLabel"></span>
    </header>

    <!-- Step Bar (persistent, always visible) -->
    <div class="step-bar" id="stepBar">
      <div class="step-bar__track">
        <div class="step-bar__fill" id="stepBarFill"></div>
      </div>
      <div class="step-bar__steps">
        <div class="step-bar__step step-bar__step--active" data-stage="0" id="step0">
          <div class="step-bar__dot"></div>
          <div class="step-bar__label">经验评估</div>
        </div>
        <div class="step-bar__step" data-stage="1" id="step1">
          <div class="step-bar__dot"></div>
          <div class="step-bar__label">产品包装</div>
        </div>
        <div class="step-bar__step" data-stage="2" id="step2">
          <div class="step-bar__dot"></div>
          <div class="step-bar__label">启动套件</div>
        </div>
      </div>
      <div class="step-bar__desc" id="stepDesc">找到你经验里最值钱的部分</div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="chat-v4__messages" role="log" aria-label="对话内容">
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
      <div class="input-bar__inner">
        <input class="input-bar__field" type="text" placeholder="说点什么..." id="chatInput" aria-label="输入消息">
        <button class="input-bar__send" id="sendBtn" aria-label="发送消息">↑</button>
      </div>
    </div>
  </div>

  <!-- ===== View 3: Kit ===== -->
  <div id="kit" class="view kit-view">

    <!-- Header -->
    <header class="app-header">
      <span class="app-header__title">启动套件</span>
    </header>

    <div class="kit-view__content">
      <div class="kit-view__intro fade-in">
        <div class="kit-view__label">全部就绪</div>
        <h1 class="kit-view__heading">你的启动套件</h1>
        <p class="kit-view__desc">
          基于你的经验，我们为你生成了全套启动素材。复制即可使用。
        </p>
      </div>

      <div id="kit-content">
        <!-- Kit content rendered by kit.js -->
      </div>
    </div>
  </div>

  <!-- Scripts (no modules — WeChat compatible) -->
  <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
  <script src="js/paywall.js?v=6"></script>
  <script src="js/chat.js?v=6"></script>
  <script src="js/kit.js?v=6"></script>
  <script src="js/app.js?v=6"></script>
  <script>
    // Handle OAuth callback: update localStorage with authenticated user ID
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('auth') === '1' && params.get('uid')) {
        localStorage.setItem('sp_user_id', params.get('uid'));
        localStorage.setItem('sp_auth', 'wechat');
        // Clean URL without reload
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>
</body>
</html>
