<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>认识自己 — 启点</title>
  <link rel="stylesheet" href="design-system.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <button class="app-header__back" onclick="location.href='index.html'" aria-label="返回首页">←</button>
    <span class="app-header__title">认识自己</span>
    <span class="app-header__step">3/8</span>
  </header>

  <!-- Progress Bar -->
  <div class="progress-bar" role="progressbar" aria-valuenow="37" aria-valuemin="0" aria-valuemax="100" aria-label="探索进度">
    <div class="progress-bar__fill" style="width: 37.5%"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area chat-area--no-chip">
    <div class="chat-area__messages" role="log" aria-label="对话内容">

      <!-- Q1: Industry -->
      <div class="chat-row chat-row--ai fade-in">
        <div class="bubble-ai">你在哪个行业干了多少年？</div>
      </div>

      <!-- Options for Q1 -->
      <div class="chat-row chat-row--options fade-in">
        <button class="option-btn option-btn--selected">建材/装修</button>
        <button class="option-btn">餐饮/食品</button>
        <button class="option-btn">零售/电商</button>
        <button class="option-btn">制造业</button>
        <button class="option-btn">物流/运输</button>
      </div>

      <!-- User selected: 建材 -->
      <div class="chat-row chat-row--user fade-in">
        <div class="bubble-user-option">建材</div>
      </div>

      <!-- Q2 -->
      <div class="chat-row chat-row--ai fade-in">
        <div class="bubble-ai">过去10年，哪件事你做得比身边大多数同行都稳？</div>
      </div>

      <!-- User free text -->
      <div class="chat-row chat-row--user fade-in">
        <div class="bubble-user-text">我帮客户省了3万块装修费，对瓷砖出厂价门儿清。</div>
      </div>

      <!-- Confidence Boost -->
      <div class="chat-row chat-row--confidence fade-in">
        <div class="confidence-boost">
          帮人省钱是真本事。很多业主愿意为这种内行经验付费。
        </div>
      </div>

      <!-- Q3 (current question) -->
      <div class="chat-row chat-row--ai fade-in">
        <div class="bubble-ai">你知道哪些"行内人觉得正常，外行根本不知道"的信息？</div>
      </div>

      <!-- Options for Q3 -->
      <div class="chat-row chat-row--options fade-in">
        <button class="option-btn">价格内幕</button>
        <button class="option-btn">采购渠道</button>
        <button class="option-btn">质量鉴别</button>
        <button class="option-btn">施工猫腻</button>
      </div>

    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-bar__inner">
      <input class="input-bar__field" type="text" placeholder="说点什么..." id="chatInput" aria-label="输入消息">
      <button class="input-bar__send" id="sendBtn" aria-label="发送消息">↑</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('input', () => {
      sendBtn.classList.toggle('input-bar__send--active', input.value.trim().length > 0);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', () => {
      if (input.value.trim()) sendMessage();
    });

    function sendMessage() {
      const text = input.value.trim();
      input.value = '';
      sendBtn.classList.remove('input-bar__send--active');

      const messages = document.querySelector('.chat-area__messages');

      // User bubble
      const row = document.createElement('div');
      row.className = 'chat-row chat-row--user fade-in';
      row.innerHTML = `<div class="bubble-user-text">${escapeHtml(text)}</div>`;
      messages.appendChild(row);

      // Loading
      const loadingRow = document.createElement('div');
      loadingRow.className = 'chat-row chat-row--loading';
      loadingRow.innerHTML = '<div class="bubble-ai loading-dots"><span></span><span></span><span></span></div>';
      messages.appendChild(loadingRow);

      // Scroll to bottom
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

      // Simulate AI response (replace with real API call)
      setTimeout(() => {
        loadingRow.remove();
        const aiRow = document.createElement('div');
        aiRow.className = 'chat-row chat-row--ai fade-in';
        aiRow.innerHTML = '<div class="bubble-ai">这很有价值。继续说，你以前客户最常因为什么来找你？</div>';
        messages.appendChild(aiRow);
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }, 1500);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
