<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px;
  height: 1000px;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  overflow: hidden;
}
.container {
  width: 750px;
  height: 1000px;
  padding: 40px;
  position: relative;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
}
/* Top banner */
.banner {
  background: linear-gradient(90deg, #e94560, #ff6b6b);
  border-radius: 16px;
  padding: 24px 32px;
  margin-bottom: 28px;
  text-align: center;
}
.banner h1 {
  color: white;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: 2px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
.banner .sub {
  color: rgba(255,255,255,0.9);
  font-size: 20px;
  margin-top: 8px;
  font-weight: 500;
}
/* Main content */
.content {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 28px 32px;
  border: 1px solid rgba(255,255,255,0.1);
}
.section-title {
  color: #e94560;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: "";
  display: inline-block;
  width: 4px;
  height: 24px;
  background: #e94560;
  border-radius: 2px;
}
/* Example savings */
.savings-box {
  background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(255,107,107,0.1));
  border: 1px solid rgba(233,69,96,0.3);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
}
.savings-box .item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.savings-box .item:last-child { margin-bottom: 0; }
.savings-box .label {
  color: rgba(255,255,255,0.8);
  font-size: 18px;
}
.savings-box .price-old {
  color: rgba(255,255,255,0.4);
  font-size: 18px;
  text-decoration: line-through;
}
.savings-box .price-new {
  color: #4ecca3;
  font-size: 22px;
  font-weight: 700;
}
.savings-box .save {
  color: #e94560;
  font-size: 16px;
  font-weight: 600;
}
/* Services */
.services {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
.service-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 14px 18px;
}
.service-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.s1 { background: rgba(78,204,163,0.2); }
.s2 { background: rgba(69,162,233,0.2); }
.s3 { background: rgba(255,193,69,0.2); }
.service-text {
  color: rgba(255,255,255,0.9);
  font-size: 18px;
  font-weight: 500;
}
.service-desc {
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  margin-top: 2px;
}
/* CTA */
.cta {
  background: linear-gradient(90deg, #4ecca3, #45a2e9);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-top: 16px;
}
.cta .main-text {
  color: white;
  font-size: 26px;
  font-weight: 800;
}
.cta .sub-text {
  color: rgba(255,255,255,0.85);
  font-size: 16px;
  margin-top: 6px;
}
/* Badge */
.badge {
  position: absolute;
  top: 52px;
  right: 56px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  width: 90px;
  height: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.badge .num {
  color: #4ecca3;
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
}
.badge .txt {
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  margin-top: 2px;
}
/* Bottom tag */
.bottom-tags {
  margin-top: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tag {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 6px 14px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
}
</style>
</head>
<body>
<div class="container">
  <div class="badge">
    <div class="num">10+</div>
    <div class="txt">年经验</div>
  </div>
  <div class="banner">
    <h1>装修建材帮你省钱</h1>
    <div class="sub">10年建材老兵帮你审清单、找平替、避大坑</div>
  </div>
  <div class="content">
    <div class="section-title">真实省钱案例</div>
    <div class="savings-box">
      <div class="item">
        <span class="label">80x80 瓷砖（客厅用）</span>
        <span>
          <span class="price-old">80元/平</span>
          →
          <span class="price-new">25-35元/平</span>
          <span class="save"> 省4-5千</span>
        </span>
      </div>
      <div class="item">
        <span class="label">品牌马桶</span>
        <span>
          <span class="price-old">3000+</span>
          →
          <span class="price-new">800-1200</span>
          <span class="save"> 省2千+</span>
        </span>
      </div>
      <div class="item">
        <span class="label">全屋建材清单审查</span>
        <span>
          <span class="save" style="font-size:18px;">帮你省 5000-20000 元</span>
        </span>
      </div>
    </div>
    <div class="section-title">我能帮你做什么</div>
    <div class="services">
      <div class="service-item">
        <div class="service-icon s1">📋</div>
        <div>
          <div class="service-text">材料清单审查</div>
          <div class="service-desc">逐项检查你准备买的建材，告诉你贵不贵</div>
        </div>
      </div>
      <div class="service-item">
        <div class="service-icon s2">💰</div>
        <div>
          <div class="service-text">平替产品推荐</div>
          <div class="service-desc">同质量更便宜的替代品，不花冤枉钱</div>
        </div>
      </div>
      <div class="service-item">
        <div class="service-icon s3">🏠</div>
        <div>
          <div class="service-text">全屋预算规划</div>
          <div class="service-desc">哪些该花、哪些能省、一分钱花在刀刃上</div>
        </div>
      </div>
    </div>
    <div class="cta">
      <div class="main-text">首次咨询免费</div>
      <div class="sub-text">私信发你的建材清单，帮你逐条看</div>
    </div>
  </div>
  <div class="bottom-tags">
    <span class="tag">装修避坑</span>
    <span class="tag">建材咨询</span>
    <span class="tag">瓷砖平替</span>
    <span class="tag">省钱攻略</span>
    <span class="tag">建材老兵</span>
  </div>
</div>
</body>
</html>
